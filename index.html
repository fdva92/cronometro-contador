<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronómetro contador</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
      transition: background 2s ease;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 50%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 50%; }
      100% { background-position: 0% 50%; }
    }

    body.color-change {
      background: linear-gradient(45deg, #c2e9fb, #a1c4fd, #fbc2eb, #f7d9ff);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    h1 {
      font-size: 3rem;
      margin: 0.5rem 0;
    }

    .display-segundos {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    button {
      margin: 0.2rem;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      color: #fff;
      background: #333;
      transition: transform 0.1s ease, background 0.25s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #555;
    }

    #lista {
      text-align: left;
      width: 250px;
      margin-top: 1rem;
    }

    li {
      margin-bottom: 0.3rem;
    }
  </style>
</head>
<body>
  <h1 id="tiempo">00:00:00</h1>

  <button onclick="iniciar()">Iniciar</button>
  <button onclick="registrarVuelta()">Registrar</button>
  <button onclick="detener()">Detener</button>

  <h2>Vueltas:</h2>
  <ul id="lista"></ul>

  <script src="01.js"></script>
</body>
</html>
